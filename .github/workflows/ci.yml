name: CI - Quality Gates

on:
  pull_request:
    branches: [develop]
  workflow_dispatch:

jobs:
  backend:
    name: Backend (ruff, mypy, pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: scentscape_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/pyproject.toml"
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        working-directory: backend
        run: ruff check app tests
      - name: Mypy
        working-directory: backend
        run: mypy app
      - name: Pytest
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/scentscape_test
          REDIS_URL: redis://localhost:6379/1
          SENTRY_DSN: ""
          JWT_SECRET_KEY: test-secret-key-for-testing-only
        run: pytest tests -v --maxfail=1

  frontend:
    name: Frontend (eslint, tsc, build, e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: ESLint
        working-directory: frontend
        run: npm run lint
      - name: TypeScript
        working-directory: frontend
        run: npm run type-check
      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build
      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Playwright E2E (Chromium)
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npx playwright test --project=chromium

  preview-deploy:
    name: Vercel Preview Deploy
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Resolve preview secret keys
        id: preview_secret_keys
        run: |
          echo "vercel_token=VERCEL_TOKEN" >> "$GITHUB_OUTPUT"
          echo "vercel_org_id=VERCEL_ORG_ID" >> "$GITHUB_OUTPUT"
          echo "vercel_project_id=VERCEL_PROJECT_ID" >> "$GITHUB_OUTPUT"
      - name: Deploy preview when secrets exist
        env:
          VERCEL_TOKEN: ${{ secrets[steps.preview_secret_keys.outputs.vercel_token] }}
          VERCEL_ORG_ID: ${{ secrets[steps.preview_secret_keys.outputs.vercel_org_id] }}
          VERCEL_PROJECT_ID: ${{ secrets[steps.preview_secret_keys.outputs.vercel_project_id] }}
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::warning::Preview deployment blocked: missing Vercel secrets"
            exit 0
          fi
          cd frontend
          vercel deploy --token="$VERCEL_TOKEN" --yes
